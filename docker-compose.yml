services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
  qdrant:
    image: qdrant/qdrant:v1-unprivileged
    ports:
      - "6333:6333"
      - "6334:6334"
  ollama:
    image: ollama/ollama:0.31.1
    ports:
      - "11434:11434"
    entrypoint: >
      sh -c "ollama serve & sleep 5 && ollama pull qwen3:0.6b && wait"

  backend:
    build:
      context: .
      dockerfile: ./backend/dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - qdrant
      - ollama
    env_file:
      - ./backend/src/core/.env

  rq-worker:
    build:
      context: .
      dockerfile: ./backend/dockerfile
    command: ["uv", "run", "rq", "worker", "JobsQueue", "--url", "redis://redis:6379"]
    depends_on:
      - redis
      - qdrant
      - ollama
    env_file:
      - ./backend/src/core/.env
        
  frontend:
    build:
      context: .
      dockerfile: ./frontend/civis-ai-frontend/dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    env_file:
      - ./frontend/civis-ai-frontend/.env


